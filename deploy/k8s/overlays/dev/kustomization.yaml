apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# 开发/测试环境示例：通过 overlay 覆盖镜像与域名
images:
  - name: shipyard-server
    newName: ghcr.io/your-org/shipyard-server
    newTag: dev
  - name: shipyard-web
    newName: ghcr.io/your-org/shipyard-web
    newTag: dev

patches:
  - target:
      kind: Ingress
      name: shipyard
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: shipyard-dev.local

