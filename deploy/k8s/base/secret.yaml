apiVersion: v1
kind: Secret
metadata:
  name: shipyard-secret
type: Opaque
stringData:
  # JWT 签名密钥：生产务必改为长随机串（建议 ≥32 字符），勿提交真实值到公开仓库
  JWT_SECRET: "change_me_at_least_32_chars_long_!!"
  # 对称加密密钥（用于落库敏感字段等）：必填，建议 ≥32 字符强随机
  ENCRYPTION_KEY: "change_me_at_least_32_chars_long_!!"
  # Postgres：postgresql://用户名:密码@主机:5432/数据库名
  # 主机名须与集群内 Service 一致（kubectl -n shipyard get svc）；密码若含 @:#/ 等需 URL 编码
  # 若用 Bitnami Helm（见 docs/runbooks/shipyard-self-deploy-via-local-console-k8s.md），用户常为 postgres，库名为 auth.database
  DATABASE_URL: "postgresql://postgres:change_me@postgres:5432/shipyard"
  # Redis：无密码可写 redis://redis:6379/0 ；有密码为 redis://:密码@主机:6379/0（注意 :密码 前仍有冒号）
  # Bitnami standalone 时 Service 名常为 redis-master，以 get svc 为准
  REDIS_URL: "redis://:change_me@redis-master:6379/0"
  # 发信密码（可选；不用 SMTP 可留空字符串）
  SMTP_PASS: ""
