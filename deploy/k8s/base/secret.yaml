apiVersion: v1
kind: Secret
metadata:
  name: shipyard-secret
type: Opaque
stringData:
  # 生产环境务必替换为强随机值
  JWT_SECRET: "change_me_at_least_32_chars_long_!!"
  ENCRYPTION_KEY: "change_me_at_least_32_chars_long_!!"
  # 推荐使用托管 Postgres/Redis，并在这里填入真实连接串
  DATABASE_URL: "postgresql://shipyard:change_me@postgres:5432/shipyard"
  REDIS_URL: "redis://redis:6379"
  # SMTP 密码（可选）
  SMTP_PASS: ""

