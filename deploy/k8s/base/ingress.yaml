apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shipyard
  annotations:
    # 如使用 nginx-ingress，可按需开启下面配置
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: shipyard.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: shipyard-server
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shipyard-web
                port:
                  name: http

