apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipyard-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipyard-web
  template:
    metadata:
      labels:
        app: shipyard-web
    spec:
      containers:
        - name: web
          image: shipyard-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20

