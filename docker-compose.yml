services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shipyard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shipyard_pass}
      POSTGRES_DB: ${POSTGRES_DB:-shipyard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shipyard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-shipyard}:${POSTGRES_PASSWORD:-shipyard_pass}@postgres:5432/${POSTGRES_DB:-shipyard}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGIN: ${APP_URL:-http://localhost:5173}
      APP_URL: ${APP_URL:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@shipyard.local}
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - artifact_store:/app/artifacts

  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    command: ["node", "dist/worker.js"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-shipyard}:${POSTGRES_PASSWORD:-shipyard_pass}@postgres:5432/${POSTGRES_DB:-shipyard}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ARTIFACT_STORE_PATH: /app/artifacts
      # 流水线 docker build 拉 Docker Hub 失败时，设为可访问的 node:20-alpine 等价镜像（见根 Dockerfile ARG NODE_IMAGE）
      SHIPYARD_CONTAINER_BASE_IMAGE: ${SHIPYARD_CONTAINER_BASE_IMAGE:-}
    volumes:
      - artifact_store:/app/artifacts
      - /var/run/docker.sock:/var/run/docker.sock  # Phase 2: Docker 隔离构建

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  postgres_data:
  redis_data:
  artifact_store:
