name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: shipyard_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shipyard_ci
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_jwt_secret_must_be_at_least_32_chars
      ENCRYPTION_KEY: ci_encryption_key_at_least_32_chars_long
      APP_URL: http://127.0.0.1:5173
      SERVER_PUBLIC_URL: http://127.0.0.1:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shipyard/server db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e
