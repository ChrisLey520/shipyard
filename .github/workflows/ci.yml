name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  # 可选：Secrets GIT_SMOKE_URLS（多行 URL）或 GIT_SMOKE_BASE_URL（单 URL），未配置则跳过；见 docs/self-hosted-git.md
  git-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Git 只读 smoke（可选）
        env:
          GIT_SMOKE_BASE_URL: ${{ secrets.GIT_SMOKE_BASE_URL }}
          GIT_SMOKE_URLS: ${{ secrets.GIT_SMOKE_URLS }}
        run: |
          set -e
          urls_file="$(mktemp)"
          if [ -n "${GIT_SMOKE_URLS:-}" ]; then
            printf '%s\n' "$GIT_SMOKE_URLS" >"$urls_file"
          elif [ -n "${GIT_SMOKE_BASE_URL:-}" ]; then
            printf '%s\n' "$GIT_SMOKE_BASE_URL" >"$urls_file"
          fi
          if [ ! -s "$urls_file" ]; then
            echo "GIT_SMOKE_URLS / GIT_SMOKE_BASE_URL 均未配置，跳过"
            rm -f "$urls_file"
            exit 0
          fi
          ok=0
          while IFS= read -r line || [ -n "$line" ]; do
            u="$(echo "$line" | tr -d '\r' | xargs)"
            [ -z "$u" ] && continue
            echo "probe: $u"
            curl -sfI --max-time 15 "$u" | head -n 1
            ok=1
          done <"$urls_file"
          rm -f "$urls_file"
          if [ "$ok" -eq 0 ]; then
            echo "无有效 URL 行"
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: shipyard_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shipyard_ci
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_jwt_secret_must_be_at_least_32_chars
      ENCRYPTION_KEY: ci_encryption_key_at_least_32_chars_long
      APP_URL: http://127.0.0.1:5173
      SERVER_PUBLIC_URL: http://127.0.0.1:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shipyard/server db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e

  monitoring-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: shipyard_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      MONITORING_PORT: '3031'
      MONITORING_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/monitoring_ci
      MONITORING_ADMIN_TOKEN: e2e-admin-token
      MONITORING_SEED_PROJECT_KEY: e2e_project
      MONITORING_SEED_INGEST_TOKEN: e2e-ingest-token

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: 安装 psql 客户端
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: 幂等创建 monitoring_ci 库
        run: |
          set -euo pipefail
          ADMIN_URL="postgresql://postgres:postgres@localhost:5432/postgres"
          psql "$ADMIN_URL" -v ON_ERROR_STOP=1 -c "SELECT 1" >/dev/null
          EXISTS=$(psql "$ADMIN_URL" -tAc "SELECT 1 FROM pg_database WHERE datname = 'monitoring_ci'")
          if [ "$EXISTS" = "1" ]; then
            echo "monitoring_ci already exists"
          else
            psql "$ADMIN_URL" -v ON_ERROR_STOP=1 -c "CREATE DATABASE monitoring_ci;"
          fi

      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e:monitoring
