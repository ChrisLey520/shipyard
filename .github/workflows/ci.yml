name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  # 可选：在仓库 Secrets 中配置 GIT_SMOKE_BASE_URL（只读 HEAD，如自建 GitLab /version），未配置则跳过
  git-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Git 只读 smoke（可选）
        env:
          GIT_SMOKE_BASE_URL: ${{ secrets.GIT_SMOKE_BASE_URL }}
        run: |
          if [ -z "$GIT_SMOKE_BASE_URL" ]; then
            echo "GIT_SMOKE_BASE_URL 未配置，跳过"
            exit 0
          fi
          curl -sfI --max-time 15 "$GIT_SMOKE_BASE_URL" | head -n 1

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: shipyard_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shipyard_ci
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_jwt_secret_must_be_at_least_32_chars
      ENCRYPTION_KEY: ci_encryption_key_at_least_32_chars_long
      APP_URL: http://127.0.0.1:5173
      SERVER_PUBLIC_URL: http://127.0.0.1:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shipyard/server db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e
